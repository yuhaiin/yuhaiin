name: Container

on:
  push:
    branches: [main]
    tags: [v*]

jobs:
  get_version:
    outputs:
      front_version: ${{ steps.get-version.outputs.front_version }}
    runs-on: ubuntu-latest
    steps:
      - id: get-version
        run: |
          echo "front_version=$(git ls-remote https://github.com/yuhaiin/yuhaiin.github.io.git | grep refs/heads/main | cut -f1)" >> $GITHUB_OUTPUT

  package:
    needs: get_version
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: "0"
          fetch-tags: "true"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: NFS Docker metadata
        id: meta-nfs
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false
          tags: |
            type=raw,value=main-nfs,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}-nfs

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          go-version-file: "go.mod"

      - name: update dep
        run: |
          go get -v -u github.com/yuhaiin/yuhaiin.github.io@${{ needs.get_version.outputs.front_version }}

      - name: Build container binaries
        env:
          GOTOOLCHAIN: auto
        run: |
          set -euo pipefail
          mkdir -p .docker-binaries

          for arch in amd64 arm64; do
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 make yuhaiin
            mv yuhaiin ".docker-binaries/yuhaiin-linux-${arch}"
          done

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 make yuhaiin EXTRA_GO_TAGS=sqlite3_dotlk,yuhaiin_nfs
          mv yuhaiin .docker-binaries/yuhaiin-linux-amd64-nfs

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: cmd/yuhaiin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push NFS image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          file: cmd/yuhaiin/Dockerfile
          build-args: |
            BINARY_SUFFIX=-nfs
          push: true
          tags: ${{ steps.meta-nfs.outputs.tags }}
          labels: ${{ steps.meta-nfs.outputs.labels }}
